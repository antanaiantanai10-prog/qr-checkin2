<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administratoriaus Prisijungimas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <style>
        body {
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center">

    <div class="max-w-md w-full mx-auto px-6">

        <div class="bg-white rounded-3xl shadow-2xl p-10">

            <div class="text-center mb-8">
                <i class="fas fa-shield-alt text-6xl text-blue-600 mb-4"></i>
                <h1 class="text-3xl font-bold text-gray-800">Administratorius</h1>
                <p class="text-gray-500 mt-2">Prisijunkite prie sistemos valdymo</p>
            </div>

            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    {% for message in messages %}
                        <div class="mb-6 px-6 py-4 rounded-2xl text-sm bg-red-100 text-red-700">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST" class="space-y-6">
                <!-- Teisingas CSRF tokenas -->
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Vartotojo vardas</label>
                    <input type="text" name="username" required
                           class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500"
                           placeholder="Įveskite vartotojo vardą">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Slaptažodis</label>
                    <input type="password" name="password" required
                           class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500"
                           placeholder="Įveskite slaptažodį">
                </div>

                <button type="submit"
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-2xl font-semibold text-lg transition">
                    Prisijungti
                </button>
            </form>

        </div>
    </div>

</body>
</html>
