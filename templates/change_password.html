<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slaptažodžio Keitimas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <style>
        body {
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center">

    <div class="max-w-md w-full mx-auto px-6">

        <div class="bg-white rounded-3xl shadow-2xl p-10">

            <div class="text-center mb-8">
                <i class="fas fa-key text-6xl text-amber-600 mb-4"></i>
                <h1 class="text-3xl font-bold text-gray-800">Keisti slaptažodį</h1>
                <p class="text-gray-500 mt-2">Administratorius</p>
            </div>

            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    {% for message in messages %}
                        <div class="mb-6 px-6 py-4 rounded-2xl text-sm 
                            {% if 'success' in message or 'Sėkmingai' in message %}
                                bg-green-100 text-green-700
                            {% else %}
                                bg-red-100 text-red-700
                            {% endif %}">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST" class="space-y-6">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Dabartinis slaptažodis</label>
                    <input type="password" name="current_password" required
                           class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500"
                           placeholder="Įveskite dabartinį slaptažodį">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Naujas slaptažodis</label>
                    <input type="password" name="new_password" required
                           class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500"
                           placeholder="Įveskite naują slaptažodį (min. 8 simboliai)">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Pakartokite naują slaptažodį</label>
                    <input type="password" name="confirm_password" required
                           class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500"
                           placeholder="Pakartokite naują slaptažodį">
                </div>

                <button type="submit"
                        class="w-full bg-amber-600 hover:bg-amber-700 text-white py-4 rounded-2xl font-semibold text-lg transition">
                    <i class="fas fa-key mr-2"></i> Keisti slaptažodį
                </button>
            </form>

            <div class="text-center mt-6">
                <a href="/" class="text-gray-500 hover:text-gray-700 text-sm flex items-center justify-center gap-2">
                    <i class="fas fa-arrow-left"></i> Grįžti į pagrindinį
                </a>
            </div>

        </div>
    </div>

</body>
</html>
