<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="UTF-8">
    <title>Sėkminga</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            text-align: center; 
            margin: 100px; 
            background-color: #f0f8f0; 
        }
        h1 { color: #28a745; }
        .info { 
            font-size: 22px; 
            margin: 20px 0; 
        }
        .back { 
            margin-top: 40px; 
            font-size: 18px; 
        }
    </style>
</head>
<body>
    <h1>✅ Ačiū!</h1>
    <h2>{{ person.first_name }} {{ person.last_name }}</h2>
    <p class="info">Jūs sėkmingai nuskenavote QR kodą ir užsiregistravote.</p>
    
    <p><strong>Skenavimo laikas:</strong> {{ now }}</p>
    
    <div class="back">
        <a href="/">← Grįžti į pagrindinį puslapį</a>
    </div>
</body>
</html>
