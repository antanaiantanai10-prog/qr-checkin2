<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="UTF-8">
    <title>Sėkminga</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            text-align: center; 
            margin: 100px; 
            background-color: #f0f8f0; 
        }
        h1 { color: #28a745; }
        .info { 
            font-size: 22px; 
            margin: 20px 0; 
        }
        .message {
            font-size: 24px;
            margin: 30px 0;
            padding: 20px;
            background: white;
            border-radius: 10px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <h1>✅ Ačiū!</h1>
    <h2>{{ person.first_name }} {{ person.last_name }}</h2>
    
    <div class="message">
        {{ message }}
    </div>
    
    <p><strong>Skenavimo laikas:</strong> {{ now }}</p>
    
    <!-- Nuoroda panaikinta kaip prašei -->
</body>
</html>
